http:
  middlewares:
    rewrite-authorize-whatsapp:
      replacePath:
        path: "/api/oidc/authorization"

  routers:
    whatsapp-mcp-authorize:
      rule: "Host(`whatsapp-mcp.example.com`) && PathPrefix(`/authorize`)"
      entrypoints: [websecure]
      service: authelia-oidc
      middlewares: [rewrite-authorize-whatsapp]
      tls:
        certResolver: mydnschallenge

    whatsapp-mcp-root:
      rule: "Host(`whatsapp-mcp.example.com`) && Path(`/`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    whatsapp-mcp-oidc:
      rule: "Host(`whatsapp-mcp.example.com`) && PathPrefix(`/api/oidc`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    whatsapp-mcp-api:
      rule: "Host(`whatsapp-mcp.example.com`) && PathPrefix(`/api`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    whatsapp-mcp-consent:
      rule: "Host(`whatsapp-mcp.example.com`) && PathPrefix(`/consent`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    whatsapp-mcp-static:
      rule: "Host(`whatsapp-mcp.example.com`) && PathPrefix(`/static`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

    whatsapp-mcp-wellknown:
      rule: "Host(`whatsapp-mcp.example.com`) && PathPrefix(`/.well-known`)"
      entrypoints: [websecure]
      service: authelia-oidc
      tls:
        certResolver: mydnschallenge

  # authelia-oidc service is defined centrally in hero-mcp-oauth.yml (shared)
